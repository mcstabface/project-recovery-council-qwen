<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" role="img" aria-labelledby="title desc">
  <title id="title">Latency By Variant</title>
  <desc id="desc">Bar chart comparing latency. Generalist took 15.0 seconds, Fixed chain took 37.0 seconds, Dynamic council took 66.5 seconds.</desc>
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="40" y="36" font-family="Arial, sans-serif" font-size="22" font-weight="700">Latency</text>
  <line x1="90" y1="330" x2="660" y2="330" stroke="#333333" stroke-width="1"/>
  <line x1="90" y1="80" x2="90" y2="330" stroke="#333333" stroke-width="1"/>
  <text x="62" y="334" font-family="Arial, sans-serif" font-size="12">0s</text>
  <text x="32" y="84" font-family="Arial, sans-serif" font-size="12">66.5s</text>
  <rect x="135" y="273.6" width="110" height="56.4" fill="#2563eb"/>
  <rect x="305" y="191.0" width="110" height="139.0" fill="#64748b"/>
  <rect x="475" y="80" width="110" height="250" fill="#059669"/>
  <text x="145" y="265.6" font-family="Arial, sans-serif" font-size="14" font-weight="700">15.0s</text>
  <text x="315" y="183.0" font-family="Arial, sans-serif" font-size="14" font-weight="700">37.0s</text>
  <text x="485" y="72" font-family="Arial, sans-serif" font-size="14" font-weight="700">66.5s</text>
  <text x="132" y="360" font-family="Arial, sans-serif" font-size="14">Generalist</text>
  <text x="315" y="360" font-family="Arial, sans-serif" font-size="14">Fixed chain</text>
  <text x="468" y="360" font-family="Arial, sans-serif" font-size="14">Dynamic council</text>
  <text x="40" y="398" font-family="Arial, sans-serif" font-size="12" fill="#555555">Dynamic council carried a substantial latency premium.</text>
</svg>

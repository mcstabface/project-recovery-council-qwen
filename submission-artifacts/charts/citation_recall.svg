<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" role="img" aria-labelledby="title desc">
  <title id="title">Citation Recall By Variant</title>
  <desc id="desc">Bar chart comparing citation recall. Generalist is 54.2 percent, Fixed chain is 0 percent, Dynamic council is 100 percent.</desc>
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="40" y="36" font-family="Arial, sans-serif" font-size="22" font-weight="700">Citation Recall</text>
  <line x1="90" y1="330" x2="660" y2="330" stroke="#333333" stroke-width="1"/>
  <line x1="90" y1="80" x2="90" y2="330" stroke="#333333" stroke-width="1"/>
  <text x="50" y="334" font-family="Arial, sans-serif" font-size="12">0%</text>
  <text x="44" y="84" font-family="Arial, sans-serif" font-size="12">100%</text>
  <rect x="135" y="194.6" width="110" height="135.4" fill="#2563eb"/>
  <rect x="305" y="330" width="110" height="0" fill="#64748b"/>
  <rect x="475" y="80" width="110" height="250" fill="#059669"/>
  <text x="147" y="186.6" font-family="Arial, sans-serif" font-size="14" font-weight="700">54.2%</text>
  <text x="329" y="314" font-family="Arial, sans-serif" font-size="14" font-weight="700">0%</text>
  <text x="491" y="72" font-family="Arial, sans-serif" font-size="14" font-weight="700">100%</text>
  <text x="132" y="360" font-family="Arial, sans-serif" font-size="14">Generalist</text>
  <text x="315" y="360" font-family="Arial, sans-serif" font-size="14">Fixed chain</text>
  <text x="468" y="360" font-family="Arial, sans-serif" font-size="14">Dynamic council</text>
  <text x="40" y="398" font-family="Arial, sans-serif" font-size="12" fill="#555555">Single empirical run per variant; descriptive only.</text>
</svg>
